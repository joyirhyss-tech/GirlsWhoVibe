    <style>
        :root {

            --mid-purple: #2d1b4e;
            --light-purple: #7b4f9e;
            --bright-purple: #9b6fc0;
            --warm-gold: #d4a853;
            --bright-gold: #e8c875;
            --silver: #c0c0c0;
            --bright-silver: #d4d4d4;
            --terracotta: #c44d3f;
            --cream: #f5f0e8;
            --near-black: #0d0a12;
            --soft-pink: #d4729e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Work Sans', sans-serif;
        }

        .font-mono {
            font-family: 'DM Mono', monospace;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--deep-purple);
            color: var(--cream);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--mid-purple); }
        ::-webkit-scrollbar-thumb { background: var(--light-purple); border-radius: 3px; }

        /* ========== ANIMATIONS ========== */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatSlow {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.12; }
            50% { transform: translateY(-25px) rotate(3deg); opacity: 0.22; }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(212, 168, 83, 0.2), 0 0 40px rgba(192, 192, 192, 0.1); }
            50% { box-shadow: 0 0 30px rgba(212, 168, 83, 0.4), 0 0 60px rgba(192, 192, 192, 0.2); }
        }

        @keyframes bounceDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        @keyframes underlineShimmer {
            0% { background-position: -100% 0; }
            100% { background-position: 200% 0; }
        }

        /* ========== SCROLL REVEAL ========== */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        .reveal-delay-4 { transition-delay: 0.4s; }

        .reveal-scale {
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .reveal-scale.visible { opacity: 1; transform: scale(1); }

        .reveal-left {
            opacity: 0;
            transform: translateX(-30px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .reveal-left.visible { opacity: 1; transform: translateX(0); }

        @media (prefers-reduced-motion: reduce) {
            .reveal, .reveal-scale, .reveal-left {
                opacity: 1 !important;
                transform: none !important;
                transition: none !important;
            }
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ========== NAV ========== */
        .nav-fixed {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(26, 10, 46, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(123, 79, 158, 0.2);

            text-decoration: none;

            font-size: 0.9rem;

            background: none;
            border: none;

        .nav-link.active { color: var(--warm-gold); }

        /* Hamburger */

            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            z-index: 1100;
            background: none;
            border: none;
        }
        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--cream);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        .mobile-menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            background: rgba(26, 10, 46, 0.98);
            backdrop-filter: blur(20px);
            z-index: 1050;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;

        .mobile-menu.open { transform: translateX(0); }
        .mobile-menu a, .mobile-menu button.mobile-nav-link {
            color: var(--cream);
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 0.75rem 2rem;
            transition: color 0.3s;
            background: none;
            border: none;
            cursor: pointer;
        }
        .mobile-menu a:hover, .mobile-menu button.mobile-nav-link:hover { color: var(--warm-gold); }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .desktop-nav { display: none !important; }
        }

        /* ========== BUTTONS ========== */
        .btn-primary {
            background: linear-gradient(135deg, var(--warm-gold), var(--bright-gold));
            color: var(--deep-purple);
            font-weight: 700;
            padding: 14px 32px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;

            width: 100%;
            height: 100%;

            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            min-height: inherit;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;

            text-align: center;

            margin-top: 1rem;

        .flow-notice {

            border-left: 3px solid var(--bright-purple);

            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;

            top: 10%;
            right: 10%;

            left: 8%;

        /* ========== EVENT CARDS ========== */
        .event-card {
            background: linear-gradient(135deg, rgba(123, 79, 158, 0.12) 0%, rgba(45, 27, 78, 0.3) 100%);

            border-color: rgba(212, 168, 83, 0.4);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);

        .event-card-featured {

            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            font-family: 'DM Mono', monospace;
            background: rgba(123, 79, 158, 0.25);
            color: var(--bright-purple);

        .flagship-badge {
            position: absolute;
            top: -1px;
            right: 24px;
            background: linear-gradient(135deg, var(--warm-gold), var(--bright-gold));

            font-weight: 700;
            letter-spacing: 0.1em;

        .glass-card {
            background: rgba(45, 27, 78, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(212, 168, 83, 0.3);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        /* ========== OUTCOME BLOCKS ========== */
        .outcome-block {
            position: relative;
            padding: 2rem;
            padding-left: 2.5rem;
            border-left: 2px solid rgba(212, 168, 83, 0.3);
            transition: all 0.3s ease;
        }
        .outcome-block:hover {
            border-left-color: var(--warm-gold);
            background: rgba(212, 168, 83, 0.03);
        }
        .outcome-number {
            position: absolute;
            top: 0.5rem;
            right: 1rem;
            font-family: 'DM Mono', monospace;
            font-size: 4rem;
            font-weight: 700;
            color: var(--warm-gold);
            opacity: 0.08;
            line-height: 1;
            pointer-events: none;
        }

        /* ========== SHIMMER UNDERLINE ========== */
        .shimmer-underline {
            position: relative;
            display: inline-block;
        }
        .shimmer-underline::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--warm-gold), var(--silver), var(--bright-gold), var(--silver), var(--warm-gold));
            background-size: 200% 100%;
            animation: underlineShimmer 3s linear infinite;
            border-radius: 2px;

        /* ========== ACCENT BORDER BLOCK ========== */
        .accent-block {
            border-left: 3px solid;
            border-image: linear-gradient(to bottom, var(--warm-gold), var(--silver)) 1;
            padding-left: 1.5rem;
            margin-bottom: 1.5rem;

        /* ========== TUTORIAL PLACEHOLDER ========== */
        .tutorial-placeholder {
            background: rgba(123, 79, 158, 0.08);
            border: 2px dashed rgba(123, 79, 158, 0.3);
            border-radius: 12px;

            text-align: center;

        /* ========== CONTAINER ========== */
        .container-max {

            margin: 0 auto;
        }

        /* ========== FOCUS STATES ========== */
        *:focus-visible {
            outline: 2px solid var(--warm-gold);
            outline-offset: 2px;
        }

        /* ========== SKIP LINK ========== */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--warm-gold);
            color: var(--deep-purple);
            padding: 8px 16px;
            z-index: 2000;
            font-weight: 600;
            transition: top 0.3s;
            text-decoration: none;
        }
        .skip-link:focus { top: 0; }
    </style>
</head>

        const { useState, useRef, useEffect, useCallback } = React;

        // ========== SCROLL REVEAL HOOK ==========
        function useScrollReveal(threshold = 0.15) {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(entry.target);
                        }
                    },
                    { threshold, rootMargin: '0px 0px -40px 0px' }
                );
                observer.observe(el);
                return () => observer.disconnect();
            }, []);

            return [ref, isVisible];
        }

        // ========== REVEAL WRAPPER ==========
        function Reveal({ children, className = '', delay = 0, type = 'up' }) {
            const [ref, isVisible] = useScrollReveal();
            const baseClass = type === 'scale' ? 'reveal-scale' : type === 'left' ? 'reveal-left' : 'reveal';
            const delayClass = delay > 0 ? 'reveal-delay-' + delay : '';

            return (
                <div ref={ref} className={baseClass + ' ' + delayClass + ' ' + (isVisible ? 'visible' : '') + ' ' + className}>
                    {children}

            );
        }
