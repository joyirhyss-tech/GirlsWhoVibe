    <style>
        :root {
            --deep-purple: #1a0a2e;
            --mid-purple: #2d1b4e;
            --light-purple: #7b4f9e;
            --bright-purple: #9b6fc0;
            --warm-gold: #d4a853;
            --bright-gold: #e8c875;
            --silver: #c0c0c0;
            --bright-silver: #d4d4d4;
            --terracotta: #c44d3f;
            --cream: #f5f0e8;
            --near-black: #0d0a12;
            --soft-pink: #d4729e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Work Sans', sans-serif;
        }

        .font-mono {
            font-family: 'DM Mono', monospace;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--deep-purple);
            color: var(--cream);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--mid-purple); }
        ::-webkit-scrollbar-thumb { background: var(--light-purple); border-radius: 3px; }

        /* ========== ANIMATIONS ========== */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatSlow {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.35; }
            50% { transform: translateY(-25px) rotate(3deg); opacity: 0.55; }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(212, 168, 83, 0.2), 0 0 40px rgba(192, 192, 192, 0.1); }
            50% { box-shadow: 0 0 30px rgba(212, 168, 83, 0.4), 0 0 60px rgba(192, 192, 192, 0.2); }
        }

        @keyframes bounceDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        @keyframes underlineShimmer {
            0% { background-position: -100% 0; }
            100% { background-position: 200% 0; }
        }

        /* ========== SCROLL REVEAL ========== */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        .reveal-delay-4 { transition-delay: 0.4s; }

        .reveal-scale {
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .reveal-scale.visible { opacity: 1; transform: scale(1); }

        .reveal-left {
            opacity: 0;
            transform: translateX(-30px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .reveal-left.visible { opacity: 1; transform: translateX(0); }

        @media (prefers-reduced-motion: reduce) {
            .reveal, .reveal-scale, .reveal-left {
                opacity: 1 !important;
                transform: none !important;
                transition: none !important;
            }
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ========== NAV ========== */
        .nav-fixed {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(26, 10, 46, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(123, 79, 158, 0.2);
        }

        .nav-link {
            color: var(--cream);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            transition: all 0.3s ease;
            cursor: pointer;
            background: none;
            border: none;
        }
        .nav-link:hover { color: var(--warm-gold); background: rgba(212, 168, 83, 0.08); }
        .nav-link.active { color: var(--warm-gold); }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            z-index: 1100;
            background: none;
            border: none;
        }
        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--cream);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        .mobile-menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            background: rgba(26, 10, 46, 0.98);
            backdrop-filter: blur(20px);
            z-index: 1050;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }
        .mobile-menu.open { transform: translateX(0); }
        .mobile-menu a, .mobile-menu button.mobile-nav-link {
            color: var(--cream);
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 0.75rem 2rem;
            transition: color 0.3s;
            background: none;
            border: none;
            cursor: pointer;
        }
        .mobile-menu a:hover, .mobile-menu button.mobile-nav-link:hover { color: var(--warm-gold); }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .desktop-nav { display: none !important; }
        }

        @media (max-width: 640px) {
            .grid-2col { grid-template-columns: 1fr !important; }
            .grid-3col { grid-template-columns: 1fr !important; }
        }

        /* ========== BUTTONS ========== */
        .btn-primary {
            background: linear-gradient(135deg, var(--warm-gold), var(--bright-gold));
            color: var(--deep-purple);
            font-weight: 700;
            padding: 14px 32px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.5s ease;
        }
        .btn-primary:hover::after { left: 100%; }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212, 168, 83, 0.4), 0 0 12px rgba(192, 192, 192, 0.15);
        }

        .btn-secondary {
            background: transparent;
            color: var(--warm-gold);
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 8px;
            border: 2px solid var(--warm-gold);
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: rgba(212, 168, 83, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(212, 168, 83, 0.2);
        }

        /* ========== HERO ========== */
        .hero-bg {
            background: radial-gradient(ellipse at center, rgba(82, 28, 154, 0.78) 0%, rgba(48, 18, 86, 0.84) 60%, rgba(20, 8, 38, 0.90) 100%),
                        url('hero-bg.png');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
        }

        .floating-word {
            position: absolute;
            font-family: 'DM Mono', monospace;
            color: var(--light-purple);
            font-weight: 300;
            pointer-events: none;
            user-select: none;
        }

        .scroll-arrow {
            animation: bounceDown 2s ease-in-out infinite;
            cursor: pointer;
        }

        /* ========== SECTION DIVIDER ========== */
        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--warm-gold), var(--silver), var(--warm-gold), transparent);
            opacity: 0.4;
        }

        /* ========== SPEECH BUBBLES ========== */
        .speech-bubble-container {
            display: flex;
            gap: 2rem;
            max-width: 700px;
            margin: 0 auto;
            align-items: flex-start;
        }
        @media (max-width: 640px) {
            .speech-bubble-container { flex-direction: column; gap: 1.5rem; }
        }
        .speech-bubble-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }
        .speech-bubble {
            position: relative;
            background: rgba(123, 79, 158, 0.18);
            border: 1px solid rgba(123, 79, 158, 0.35);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--cream);
            font-style: italic;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid rgba(123, 79, 158, 0.35);
        }
        .speech-girl {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .speech-girl-1 {
            background: linear-gradient(135deg, rgba(212, 114, 158, 0.25), rgba(123, 79, 158, 0.3));
            border: 1.5px solid rgba(212, 114, 158, 0.4);
        }
        .speech-girl-2 {
            background: linear-gradient(135deg, rgba(212, 168, 83, 0.2), rgba(123, 79, 158, 0.3));
            border: 1.5px solid rgba(212, 168, 83, 0.4);
        }

        /* ========== FLIP CARDS ========== */
        .flip-card {
            perspective: 1000px;
            cursor: pointer;
            min-height: 380px;
        }
        @media (max-width: 640px) {
            .flip-card { min-height: 340px; }
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: inherit;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            min-height: inherit;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;
        }
        .flip-card-front {
            background: linear-gradient(135deg, rgba(123, 79, 158, 0.2) 0%, rgba(45, 27, 78, 0.4) 100%);
            border: 1px solid rgba(123, 79, 158, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .flip-card:not(.flipped) .flip-card-front:hover {
            border-color: var(--warm-gold);
            box-shadow: 0 8px 32px rgba(212, 168, 83, 0.15), 0 0 8px rgba(192, 192, 192, 0.1);
        }
        .flip-card-back {
            background: linear-gradient(135deg, rgba(45, 27, 78, 0.95) 0%, rgba(26, 10, 46, 0.98) 100%);
            border: 1px solid var(--warm-gold);
            transform: rotateY(180deg);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .flip-hint {
            font-size: 0.8rem;
            color: var(--warm-gold);
            margin-top: 1rem;
            font-family: 'DM Mono', monospace;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .flow-arrow {
            color: var(--warm-gold);
            font-size: 1.2rem;
            margin: 0.4rem 0;
            text-align: center;
        }

        .flow-step {
            padding: 0.6rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .flow-frustration {
            background: rgba(196, 77, 63, 0.15);
            border-left: 3px solid var(--terracotta);
        }
        .flow-notice {
            background: rgba(123, 79, 158, 0.15);
            border-left: 3px solid var(--bright-purple);
        }

            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(entry.target);
                        }
                    },
                    { threshold, rootMargin: '0px 0px -40px 0px' }
                );
                observer.observe(el);
                return () => observer.disconnect();
            }, []);

            return [ref, isVisible];
        }

            const [ref, isVisible] = useScrollReveal();

            const delayClass = delay > 0 ? 'reveal-delay-' + delay : '';

            return (
                <div ref={ref} className={baseClass + ' ' + delayClass + ' ' + (isVisible ? 'visible' : '') + ' ' + className}>
                    {children}

            );

        // ========== SPONSOR FORM COMPONENT ==========
        function SponsorForm() {
            const [amount, setAmount] = useState(599);
            const [email, setEmail] = useState('');
            const [busy, setBusy] = useState(false);
            const [error, setError] = useState('');
            const presets = [

                { amount: 299,  label: 'Half a seat' },
                { amount: 599,  label: '1 full seat' },
                { amount: 1198, label: '2 full seats' }
            ];

            const submit = () => {
                setError('');
                const amt = parseInt(amount, 10);
                if (!amt || amt < 1) { setError('Pick an amount of at least $1.'); return; }
                if (amt > 25000) { setError('For gifts over $25,000, email info@aidedeq.org and we will set up a direct invoice.'); return; }
                // Stripe donation link is choose-your-own-amount, so any pledge goes through the same URL.
                // Email is optional here (Stripe collects it on the checkout page), but if given we pass it along.
                let url = SPONSOR_STRIPE_LINK;
                const params = [];
                if (email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    params.push('prefilled_email=' + encodeURIComponent(email));
                }
                params.push('client_reference_id=gwv-summer-2026');
                url += (url.includes('?') ? '&' : '?') + params.join('&');
                setBusy(true);
                window.location.href = url;
            };

            return (
                <div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '0.6rem', marginBottom: '1rem' }}>
                        {presets.map((p) => (
                            <button
                                key={p.amount}
                                type="button"
                                onClick={() => setAmount(p.amount)}
                                className={'sponsor-tile' + (amount === p.amount ? ' is-active' : '')}
                                aria-pressed={amount === p.amount}
                            >
                                <span className="sponsor-tile-amt">${p.amount.toLocaleString()}</span>
                                <span className="sponsor-tile-sub">{p.label}</span>
                            </button>
                        ))}
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem', marginBottom: '1rem' }}>

                            <span style={{ fontFamily: "'DM Mono', monospace", fontSize: '0.72rem', letterSpacing: '0.1em', color: 'var(--warm-gold)', textTransform: 'uppercase' }}>Amount (USD)</span>
                            <input type="number" min="1" max="5000" value={amount} onChange={(e) => setAmount(e.target.value.replace(/\D/g, ''))} aria-label="Custom sponsorship amount" />
                        </label>
                        <label className="enroll-field" style={{ marginBottom: 0 }}>
                            <span style={{ fontFamily: "'DM Mono', monospace", fontSize: '0.72rem', letterSpacing: '0.1em', color: 'var(--warm-gold)', textTransform: 'uppercase' }}>Email for receipt</span>
                            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} autoComplete="email" placeholder="you@example.com" />
                        </label>
                    </div>
                    <button type="button" disabled={busy} onClick={submit} className="btn-primary" style={{ width: '100%', fontSize: '1.1rem', padding: '16px', textAlign: 'center' }}>
                        {busy ? 'Taking you to checkout...' : 'Continue to secure checkout →'}
                    </button>
                    {error && <p style={{ color: 'var(--terracotta)', fontSize: '0.88rem', marginTop: '0.75rem', textAlign: 'center' }}>{error}</p>}
                </div>
            );

      </div>
    </div>
    <div id="roo-toast" class="roo-toast" role="status" aria-live="polite"></div>
    <script src="js/roo.js" defer></script>

    <!-- Bloom Break: 60-second breathing practice. One entry point: the "Tap to bloom" button in the Bloom Break section. -->
    <div id="breath-overlay" role="dialog" aria-modal="true" aria-labelledby="breath-overlay-title" aria-hidden="true">
      <div class="breath-stage">
        <button id="breath-close" type="button" class="breath-close" aria-label="Close bloom break">&times;</button>
        <div id="breath-overlay-title" class="sr-only">60-second bloom break</div>
        <div class="breath-ring" aria-hidden="true">
          <div class="breath-ring-glow"></div>
          <svg class="breath-blossom" viewBox="-100 -100 200 200" width="240" height="240" aria-hidden="true">
            <defs>
              <radialGradient id="sakura-modal-petal" cx="50%" cy="42%">
                <stop offset="0%" stop-color="#fff6f8"/>
                <stop offset="45%" stop-color="#fbcfe8"/>
                <stop offset="100%" stop-color="#ec78a4"/>
              </radialGradient>
              <radialGradient id="sakura-modal-core">
                <stop offset="0%" stop-color="#fff5c0"/>
                <stop offset="70%" stop-color="#e8c875"/>
                <stop offset="100%" stop-color="#d4a853"/>
              </radialGradient>
              <filter id="sakura-glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <g class="sakura-petals">
              <g transform="rotate(0)"><path d="M 0 0 C -22 -14, -36 -44, -16 -72 C -8 -80, -3 -76, 0 -66 C 3 -76, 8 -80, 16 -72 C 36 -44, 22 -14, 0 0 Z" fill="url(#sakura-modal-petal)"/></g>
              <g transform="rotate(72)"><path d="M 0 0 C -22 -14, -36 -44, -16 -72 C -8 -80, -3 -76, 0 -66 C 3 -76, 8 -80, 16 -72 C 36 -44, 22 -14, 0 0 Z" fill="url(#sakura-modal-petal)"/></g>
              <g transform="rotate(144)"><path d="M 0 0 C -22 -14, -36 -44, -16 -72 C -8 -80, -3 -76, 0 -66 C 3 -76, 8 -80, 16 -72 C 36 -44, 22 -14, 0 0 Z" fill="url(#sakura-modal-petal)"/></g>
              <g transform="rotate(216)"><path d="M 0 0 C -22 -14, -36 -44, -16 -72 C -8 -80, -3 -76, 0 -66 C 3 -76, 8 -80, 16 -72 C 36 -44, 22 -14, 0 0 Z" fill="url(#sakura-modal-petal)"/></g>
              <g transform="rotate(288)"><path d="M 0 0 C -22 -14, -36 -44, -16 -72 C -8 -80, -3 -76, 0 -66 C 3 -76, 8 -80, 16 -72 C 36 -44, 22 -14, 0 0 Z" fill="url(#sakura-modal-petal)"/></g>
            </g>
            <g class="sakura-stamens" filter="url(#sakura-glow)">
              <circle cx="0" cy="-9" r="1.8" fill="#fff7d1"/>
              <circle cx="8.5" cy="-2.8" r="1.8" fill="#fff7d1"/>
              <circle cx="5.2" cy="7.5" r="1.8" fill="#fff7d1"/>
              <circle cx="-5.2" cy="7.5" r="1.8" fill="#fff7d1"/>
              <circle cx="-8.5" cy="-2.8" r="1.8" fill="#fff7d1"/>
            </g>
            <circle cx="0" cy="0" r="10" fill="url(#sakura-modal-core)"/>
          </svg>
        </div>
        <div class="breath-cue" id="breath-cue" aria-live="polite">Tap begin</div>
        <div class="breath-dots" id="breath-dots" role="progressbar" aria-valuemin="0" aria-valuemax="6" aria-valuenow="0" aria-label="Breath progress">
          <span class="breath-dot" data-i="0"></span>
          <span class="breath-dot" data-i="1"></span>
          <span class="breath-dot" data-i="2"></span>
          <span class="breath-dot" data-i="3"></span>
          <span class="breath-dot" data-i="4"></span>
          <span class="breath-dot" data-i="5"></span>
        </div>
        <div class="breath-count" id="breath-count" aria-live="polite"></div>
        <div class="breath-actions">
          <button id="breath-start" type="button" class="btn-primary">Begin</button>
          <p class="breath-hint">4 in &middot; 6 out &middot; six breaths &middot; silent</p>
        </div>
      </div>
    </div>
    <script src="js/breath.js" defer></script>
</body>
</html>
